name: Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: bot
            image: ghcr.io/mrwong/rockybot
            dockerfile: services/bot/Dockerfile
            context: .
          - service: obsidian-bridge
            image: ghcr.io/mrwong/rockybot-bridge
            dockerfile: services/obsidian-bridge/Dockerfile
            context: services/obsidian-bridge
          - service: obsidian-headless
            image: ghcr.io/mrwong/rockybot-headless
            dockerfile: services/obsidian-headless/Dockerfile
            context: services/obsidian-headless

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
