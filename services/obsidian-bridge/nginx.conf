server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Vault notes use research/-prefixed absolute wikilinks; redirect them to the actual topic paths
    rewrite ^/research/(.+)$ /$1 permanent;
    rewrite ^/research/?$ / permanent;

    location / {
        try_files $uri $uri.html $uri/index.html /404.html =404;
    }

    location /export/ {
        proxy_pass http://rockybot-bridge:3001/export/;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
